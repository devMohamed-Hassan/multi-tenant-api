services:
  db:
    image: postgres:16
    container_name: multitenant_db
    environment:
      POSTGRES_DB: multitenant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_real_postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: multitenant_app
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/multitenant_db
      DB_USERNAME: postgres
      DB_PASSWORD: your_real_postgres_password
      JWT_SECRET: super-secret-key-must-be-at-least-32-characters-long
      JWT_EXPIRATION: 86400000
      APP_MESSAGE: Hello from Docker!
      SPRING_PROFILE: prod
      ADMIN_NAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"

volumes:
  postgres_data:
