spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  security:
    user:
      name: ${ADMIN_NAME}
      password: ${ADMIN_PASSWORD}

logging:
  level:
    root: WARN
    com.saasauth: INFO